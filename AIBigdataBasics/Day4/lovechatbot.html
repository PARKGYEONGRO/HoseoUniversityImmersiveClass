<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>❤️ 연애상담 AI 챗봇 ❤️</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #ffe5ec, #ffc2d1);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .chat-container {
            width: 450px;
            height: 650px;
            background-color: #ffffff;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(255, 75, 110, 0.15);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .chat-header {
            background-color: #ff4d6d;
            color: white;
            padding: 18px;
            font-size: 1.2rem;
            font-weight: bold;
            text-align: center;
        }

        .chat-messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            background-color: #fff0f3;
        }

        .message {
            margin-bottom: 15px;
            display: flex;
            flex-direction: column;
        }

        .message-content {
            padding: 12px 16px;
            border-radius: 16px;
            max-width: 80%;
            font-size: 0.95rem;
            line-height: 1.5;
            word-break: break-all;
        }

        .user-message {
            align-items: flex-end;
        }

        .user-message .message-content {
            background-color: #ff4d6d;
            color: white;
            border-bottom-right-radius: 2px;
        }

        .bot-message {
            align-items: flex-start;
        }

        .bot-message .message-content {
            background-color: #ffffff;
            color: #333;
            border-bottom-left-radius: 2px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        /* 추천 질문 선택 영역 */
        .preset-questions {
            padding: 10px 15px;
            background-color: #ffffff;
            border-top: 1px solid #ffe5ec;
            display: flex;
            flex-direction: column;
            gap: 8px;
            flex-shrink: 0;
        }

        .preset-title {
            font-size: 0.85rem;
            color: #ff758f;
            font-weight: bold;
        }

        .preset-buttons {
            display: flex;
            flex-direction: column;
            gap: 8px;
            max-height: 160px;
            overflow-y: auto;
            padding-right: 4px;
        }

        .preset-btn {
            background-color: #fff0f3;
            color: #ff4d6d;
            border: 1px solid #ffccd5;
            padding: 10px 14px;
            border-radius: 8px;
            cursor: pointer;
            text-align: left;
            font-size: 0.9rem;
            transition: all 0.2s;
            white-space: normal;
            overflow: hidden;
            word-break: keep-all;
            flex-shrink: 0;
        }

        .preset-btn:hover {
            background-color: #ff4d6d;
            color: white;
            border-color: #ff4d6d;
        }

        /* 하단 입력 및 파일 업로드 영역 */
        .chat-input-area {
            padding: 15px;
            background-color: white;
            border-top: 1px solid #ffe5ec;
            display: flex;
            gap: 10px;
        }

        .file-input-wrapper {
            display: flex;
            align-items: center;
        }

        .file-label {
            background-color: #ffccd5;
            color: #ff4d6d;
            padding: 10px 12px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: bold;
            transition: background 0.2s;
            white-space: nowrap;
        }

        .file-label:hover {
            background-color: #ffb3c1;
        }

        #csvFileInput {
            display: none;
        }

        .chat-input {
            flex: 1;
            padding: 12px;
            border: 1px solid #ffccd5;
            border-radius: 8px;
            outline: none;
            font-size: 0.95rem;
        }

        .chat-input:focus {
            border-color: #ff4d6d;
        }

        .send-btn {
            background-color: #ff4d6d;
            color: white;
            border: none;
            padding: 0 16px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }

        .send-btn:hover {
            background-color: #c9184a;
        }
    </style>
</head>
<body>

<div class="chat-container">
    <div class="chat-header">💖 연애상담 AI 챗봇</div>
    
    <div class="chat-messages" id="chatMessages">
        <div class="message bot-message">
            <div class="message-content">안녕하세요! 당신의 연애 고민을 들어주는 연애상담 챗봇입니다. 하단의 [CSV 파일 선택] 버튼을 눌러 질문 리스트를 새롭게 업데이트하거나, 위 목록에서 원하시는 고민을 선택해보세요! 기본 데이터가 탑재되어 있습니다.</div>
        </div>
    </div>
    
    <div class="preset-questions">
        <div class="preset-title">💡 상담받고 싶은 고민을 선택하세요</div>
        <div class="preset-buttons" id="presetButtons">
            <button class="preset-btn" onclick="clickQuestion(this)">연락이 너무 줄었어요. 마음이 식은 걸까요?</button>
            <button class="preset-btn" onclick="clickQuestion(this)">남사친/여사친 문제로 계속 싸우게 돼요.</button>
            <button class="preset-btn" onclick="clickQuestion(this)">소개팅 후에 애프터 신청을 자연스럽게 하는 방법은?</button>
            <button class="preset-btn" onclick="clickQuestion(this)">이별 후 폭풍은 언제 오나요?</button>
            <button class="preset-btn" onclick="clickQuestion(this)">좋아하는 사람에게 부담스럽지 않게 대시하는 법</button>
        </div>
    </div>
    
    <div class="chat-input-area">
        <div class="file-input-wrapper">
            <label for="csvFileInput" class="file-label">CSV 파일 선택</label>
            <input type="file" id="csvFileInput" accept=".csv" onchange="loadCSV(event)">
        </div>
        <input type="text" id="chatInput" class="chat-input" placeholder="고민을 직접 입력하거나 목록을 선택하세요..." onkeypress="handleKeyPress(event)">
        <button class="send-btn" onclick="sendMessage()">전송</button>
    </div>
</div>

<script>
    const chatMessages = document.getElementById('chatMessages');
    const chatInput = document.getElementById('chatInput');
    const presetButtons = document.getElementById('presetButtons');

    // 기본 데이터베이스 (CSV 로드 전 초기 상태)
    let qaDatabase = {
        "연락이 너무 줄었어요. 마음이 식은 걸까요?": "연락의 빈도가 마음의 크기와 항상 비례하진 않아요. 바쁜 일이 있거나 관계가 편안해져서일 수도 있으니 서운함을 감정적으로 부딪히기보다 '요즘 바쁜 일 있어? 목소리 듣고 싶다'처럼 부드럽게 대화를 시작해보세요.",
        "남사친/여사친 문제로 계속 싸우게 돼요.": "서로가 생각하는 '친구'의 선이 다르기 때문입니다. 무조건 만나지 말라고 강요하기보다는 '네가 그 행동을 할 때 내가 왜 불안하고 속상한지' 구체적인 감정을 공유하고 두 사람이 함께 지킬 수 있는 명확한 기준(선)을 조율해보세요.",
        "소개팅 후에 애프터 신청을 자연스럽게 하는 방법은?": "대화 중에 나왔던 서로의 공통 관심사를 활용하는 것이 가장 좋습니다. 예를 들어 '지난번에 말씀하셨던 그 영화/맛집 이번 주말에 같이 가실래요?'처럼 자연스럽게 명분을 만들어 제안해보세요.",
        "이별 후 폭풍은 언제 오나요?": "사람마다 다르지만 보통 이별을 먼저 통보했거나 초반에 해방감을 느꼈던 사람은 2주에서 한 달 뒤 상대방의 빈자리가 크게 느껴질 때 뒤늦게 후폭풍이 찾아오는 경우가 많습니다.",
        "좋아하는 사람에게 부담스럽지 않게 대시하는 법": "처음부터 큰 호감을 표현하기보다 가벼운 인사나 작은 친절(음료수 건네기 등)로 시작해 눈도장을 찍으세요. 상대방의 반응을 살피며 서서히 대화의 빈도와 깊이를 늘려가는 것이 안전합니다."
    };

    // CSV 파일 로드 및 인코딩 처리
    function loadCSV(event) {
        const file = event.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = function(e) {
            const text = e.target.result;
            parseCSV(text);
        };
        // 엑셀 기본 한글 저장 포맷(EUC-KR)과 메모장 기본(UTF-8)을 모두 호환하도록 읽음
        reader.readAsText(file, "utf-8"); 
    }

    // CSV 데이터 파싱 후 질문 템플릿 변경 버튼 자동생성
    function parseCSV(text) {
        const lines = text.split(/\r?\n/);
        const newDatabase = {};
        presetButtons.innerHTML = ''; 

        for (let i = 1; i < lines.length; i++) {
            if (!lines[i].trim()) continue;
            
            let parts = lines[i].split(',');
            if (parts.length >= 2) {
                let question = parts[0].replace(/^"(.*)"$/, '$1').trim();
                let answer = parts.slice(1).join(',').replace(/^"(.*)"$/, '$1').trim();
                
                newDatabase[question] = answer;

                // 상단 버튼 동적 생성
                const btn = document.createElement('button');
                btn.className = 'preset-btn';
                btn.innerText = question;
                btn.onclick = function() { clickQuestion(this); };
                presetButtons.appendChild(btn);
            }
        }

        qaDatabase = newDatabase;
        appendMessage("📌 CSV 파일로부터 연애 고민 목록을 성공적으로 불러왔습니다! 상단의 리스트가 새롭게 변경되었습니다.", "bot-message");
    }

    function handleKeyPress(event) {
        if (event.key === 'Enter') {
            sendMessage();
        }
    }

    function clickQuestion(button) {
        chatInput.value = button.innerText;
        sendMessage();
    }

    function sendMessage() {
        const messageText = chatInput.value.trim();
        if (messageText === '') return;

        appendMessage(messageText, 'user-message');
        chatInput.value = '';

        setTimeout(() => {
            const botResponse = getBotResponse(messageText);
            appendMessage(botResponse, 'bot-message');
        }, 400);
    }

    function appendMessage(text, className) {
        const messageDiv = document.createElement('div');
        messageDiv.classList.add('message', className);

        const contentDiv = document.createElement('div');
        contentDiv.className = 'message-content';
        contentDiv.innerText = text;

        messageDiv.appendChild(contentDiv);
        chatMessages.appendChild(messageDiv);
        chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    // 유저 질문 키워드 기반 매칭 시스템
    function getBotResponse(userMessage) {
        if (qaDatabase[userMessage]) {
            return qaDatabase[userMessage];
        }

        for (let question in qaDatabase) {
            if (userMessage.includes(question) || question.includes(userMessage)) {
                return qaDatabase[question];
            }
        }

        return "음.. 그 고민은 데이터에 없네요. 제공된 5개 질문 목록 버튼을 눌러보거나 다른 질문을 입력해 보세요! 😢";
    }
</script>

</body>
</html>
